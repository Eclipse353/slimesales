/* Neo-Brutalist Button */
.neo-btn {
  border-radius: 1rem;
  border: 3px solid #2a2a3a;
  font-weight: 700;
  transition: all 0.15s ease;
  cursor: pointer;
  background: #1e1e28;
  color: #f0f0f5;
}

.neo-btn:hover {
  border-color: #4a4a5a;
  transform: translateY(-2px);
}

.neo-btn:active {
  transform: translateY(0);
}

.neo-btn-primary {
  background: #CDFF00;
  color: #0a0a0f;
  border-color: #CDFF00;
}

.neo-btn-primary:hover {
  background: #b8e600;
  border-color: #b8e600;
  box-shadow: 0 0 20px rgba(205, 255, 0, 0.3);
}

  background: #FF3366;
  color: white;
  border-color: #FF3366;
}

  background: #e62958;
  border-color: #e62958;
  box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
}

.neo-btn-success {
  background: #00D9A5;
  color: #0a0a0f;
  border-color: #00D9A5;
}

.neo-btn-success:hover {
  background: #00c494;
  border-color: #00c494;
  box-shadow: 0 0 20px rgba(0, 217, 165, 0.3);
}

.neo-btn-small {
  padding: 0.5rem 0.75rem;
  font-size: 0.875rem;
  border-width: 2px;
}

/* Neo-Brutalist Input */
.neo-input {
  background: #1e1e28;
  border-radius: 1rem;
  border: 3px solid #2a2a3a;
  padding: 0.75rem 1rem;
  font-weight: 500;
  font-family: 'Nunito', sans-serif;
  outline: none;
  transition: all 0.2s ease;
  color: #f0f0f5;
}

.neo-input:focus {
  border-color: #CDFF00;
  box-shadow: 0 0 0 4px rgba(205, 255, 0, 0.2);
}

.neo-input::placeholder {
  color: #6a6a7a;
}

.neo-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

.hero-banner {
  background: linear-gradient(135deg, #1a1a24 0%, #0a0a0f 50%, #16161d 100%);
  position: relative;
  overflow: hidden;
}

.hero-banner::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('https://images.pexels.com/photos/6144288/pexels-photo-6144288.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940');
  background-size: cover;
  background-position: center;
  opacity: 0.15;
  filter: blur(2px);
}

.hero-banner > * {
  position: relative;
  z-index: 1;
}

/* Animation for cards */
@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-slide-up {
  animation: slideUp 0.3s ease-out forwards;
}

/* Stagger animation delays */
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.2s; }

/* Modal overlay */
.modal-overlay {
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
}

/* Custom number input arrows */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  opacity: 1;
  height: 30px;
}

/* Gradient text */
.gradient-text {
  background: linear-gradient(135deg, #CDFF00 0%, #00D9A5 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Stat card glows */
.stat-card-revenue {
  background: linear-gradient(135deg, rgba(205, 255, 0, 0.1) 0%, rgba(205, 255, 0, 0.05) 100%);
  border-color: #CDFF00;
}

.stat-card-weekly {
  background: linear-gradient(135deg, rgba(255, 51, 102, 0.1) 0%, rgba(255, 51, 102, 0.05) 100%);
  border-color: #FF3366;
}

.stat-card-items {
  background: linear-gradient(135deg, rgba(51, 153, 255, 0.1) 0%, rgba(51, 153, 255, 0.05) 100%);
  border-color: #3399FF;
}

.stat-card-sales {
  background: linear-gradient(135deg, rgba(153, 51, 255, 0.1) 0%, rgba(153, 51, 255, 0.05) 100%);
  border-color: #9933FF;
}

/* Pulse animation for unsaved changes */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.pulse-warning {
